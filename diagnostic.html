<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-diagnostic | BG Informatique</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="Logo.png">
</head>
<body>

<div id="header-placeholder"></div>

<section class="diagnostic-page" style="background-color: #f4f4f9; padding: 60px 0; min-height: 80vh;">
    <div class="container" style="max-width: 800px; margin: auto; text-align: center;">
        <h1>Outil de Pré-diagnostic Matériel</h1>
        <div style="background: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 20px; border-radius: 8px; margin-bottom: 30px; text-align: left;">
            <strong>⚠️ Rappel :</strong> Ignorez les publicités sur le site partenaire. Suivez nos étapes.
        </div>
        <div class="grid">
            <div class="expertise-card" style="text-align: left;">
                <h3>Étape 1 : Analyse</h3>
                <p>Générez votre rapport technique via DriversCloud.</p>
                <a href="https://www.driverscloud.com/fr/demarrer" target="_blank" class="btn-cta">Lancer la détection</a>
            </div>
            <div class="expertise-card" style="text-align: left;">
                <h3>Étape 2 : Envoi</h3>
                <p>Copiez l'URL de vos résultats dans le courriel ci-dessous.</p>
                <a href="mailto:information@bginformatique.ca?subject=Pré-diagnostic" class="btn-cta" style="background-color: #28a745;">Envoyer le rapport</a>
            </div>
        </div>
    </div>
</section>

<div id="footer-placeholder"></div>

<script>
    function loadComponent(id, file, activeId) {
        fetch(file).then(r => r.text()).then(d => {
            document.getElementById(id).innerHTML = d;
            if (activeId) document.getElementById(activeId)?.classList.add('active');
        });
    }
    loadComponent('header-placeholder', 'header.html', 'nav-diagnostic');
    loadComponent('footer-placeholder', 'footer.html');
</script>

</body>
</html>
